<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colecciones - Distrito CERO</title>
    <link rel="stylesheet" href="/static/css/stilocole.css">
</head>
<body>
    <header>
        <h1>DISTRITO CERO</h1>
        <p class="subtitle">Colecciones Exclusivas de Streetwear Urbano</p>
    </header>

    <div class="container">
        <!-- Colecciones Activas -->
        <h2 class="section-title">Colecciones Disponibles</h2>
        <div class="collections-grid" id="activeCollections">
            <!-- Se llenará con JavaScript -->
        </div>

        <!-- Próximos Lanzamientos -->
        <h2 class="section-title">Próximos Lanzamientos</h2>
        <div class="collections-grid" id="comingCollections">
            <!-- Se llenará con JavaScript -->
        </div>

        <!-- Promoción -->
        <div class="promo-section">
            <h2>🔥 Suscríbete a nuestras novedades</h2>
            <p>Sé el primero en conocer los nuevos drops y colecciones exclusivas</p>
            <button class="btn">Notificarme</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Distrito CERO. Todos los derechos reservados.</p>
    </footer>

    <script>
        const activeCollections = [
            {
                name: "Urban Vibes",
                description: "Camisetas oversized con diseños minimalistas. Perfecto para el día a día.",
                emoji: "👕"
            },
            {
                name: "Night Runner",
                description: "Buzos y chamarras reflectantes. Estilo nocturno con visibilidad total.",
                emoji: "🏃"
            },
            {
                name: "Street Kings",
                description: "Pantalones cargo con múltiples bolsillos. Comodidad y funcionalidad.",
                emoji: "👖"
            }
        ];

        const comingCollections = [
            {
                name: "Neon Pulse",
                description: "Colección con colores neón y detalles holográficos. Disponible en 15 días.",
                emoji: "⚡",
                daysLeft: 15
            },
            {
                name: "Winter Frost",
                description: "Abrigos premium con tecnología térmica. Lanzamiento próximo mes.",
                emoji: "❄️",
                daysLeft: 30
            },
            {
                name: "Limited Edition 001",
                description: "Solo 500 piezas disponibles. Diseño colaborativo exclusivo.",
                emoji: "👑",
                daysLeft: 45
            }
        ];

        function renderCollections(data, containerId, isActive = true) {
            const container = document.getElementById(containerId);
            container.innerHTML = data.map(col => `
                <div class="collection-card ${!isActive ? 'coming-soon' : ''}">
                    ${!isActive ? `<div class="comingsoon-text">Próximamente</div>` : ''}
                    <div class="card-image">${col.emoji}</div>
                    <div class="card-content">
                        <div class="collection-name">${col.name}</div>
                        <p class="collection-desc">${col.description}</p>
                        <span class="status-badge ${isActive ? 'status-active' : 'status-coming'}">
                            ${isActive ? '✓ Disponible' : `⏳ En ${col.daysLeft} días`}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        // Renderizar colecciones al cargar
        renderCollections(activeCollections, 'activeCollections', true);
        renderCollections(comingCollections, 'comingCollections', false);
    </script>
</body>
</html>
