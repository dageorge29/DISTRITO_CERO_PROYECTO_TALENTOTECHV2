<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colecciones - Distrito CERO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border-bottom: 3px solid #687766;
        }

        h1 {
            font-size: 3.5em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            color: #687766;
        }

        .subtitle {
            font-size: 1.2em;
            color: #888;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .section-title {
            font-size: 2.5em;
            text-transform: uppercase;
            margin-bottom: 50px;
            padding-bottom: 20px;
            border-bottom: 2px solid #687766;
            letter-spacing: 2px;
        }

        .collections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }

        .collection-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .collection-card:hover {
            border-color: #687766;
            transform: translateY(-10px);
            box-shadow: 0 10px 30px #687766;
        }

        .card-image {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #687766 0%, #9DAC9B 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            font-weight: bold;
        }

        .card-content {
            padding: 30px;
        }

        .collection-name {
            font-size: 1.8em;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 10px;
            color: #687766;
        }

        .collection-desc {
            color: #aaa;
            margin-bottom: 15px;
            line-height: 1.6;
            font-size: 0.95em;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-active {
            background: #8B9B89  ;
            color: #000;
        }

        .status-coming {
            background: #8B9B89 ;
            color: #fff;
        }

        .coming-soon {
            position: relative;
        }

        .coming-soon::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
        }

        .comingsoon-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5em;
            color: #9DAC9B;
            font-weight: bold;
            text-transform: uppercase;
            z-index: 10;
        }

        .promo-section {
            background: linear-gradient(135deg, #687766 0%, #9DAC9B 100%);
            padding: 50px 30px;
            border-radius: 10px;
            text-align: center;
            margin-top: 80px;
        }

        .promo-section h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .promo-section p {
            font-size: 1.1em;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .btn {
            padding: 15px 40px;
            background: #000;
            color: #687766;
            border: 2px solid #687766;
            font-size: 1em;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: #687766;
            color: #000;
        }

        footer {
            background: #000;
            text-align: center;
            padding: 30px 20px;
            border-top: 2px solid #687766;
            margin-top: 80px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5em;
            }
            
            .section-title {
                font-size: 1.8em;
            }

            .collections-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>DISTRITO CERO</h1>
        <p class="subtitle">Colecciones Exclusivas de Streetwear Urbano</p>
    </header>

    <div class="container">
        <!-- Colecciones Activas -->
        <h2 class="section-title">Colecciones Disponibles</h2>
        <div class="collections-grid" id="activeCollections">
            <!-- Se llenará con JavaScript -->
        </div>

        <!-- Próximos Lanzamientos -->
        <h2 class="section-title">Próximos Lanzamientos</h2>
        <div class="collections-grid" id="comingCollections">
            <!-- Se llenará con JavaScript -->
        </div>

        <!-- Promoción -->
        <div class="promo-section">
            <h2>🔥 Suscríbete a nuestras novedades</h2>
            <p>Sé el primero en conocer los nuevos drops y colecciones exclusivas</p>
            <button class="btn">Notificarme</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Distrito CERO. Todos los derechos reservados.</p>
    </footer>

    <script>
        const activeCollections = [
            {
                name: "Urban Vibes",
                description: "Camisetas oversized con diseños minimalistas. Perfecto para el día a día.",
                emoji: "👕"
            },
            {
                name: "Night Runner",
                description: "Buzos y chamarras reflectantes. Estilo nocturno con visibilidad total.",
                emoji: "🏃"
            },
            {
                name: "Street Kings",
                description: "Pantalones cargo con múltiples bolsillos. Comodidad y funcionalidad.",
                emoji: "👖"
            }
        ];

        const comingCollections = [
            {
                name: "Neon Pulse",
                description: "Colección con colores neón y detalles holográficos. Disponible en 15 días.",
                emoji: "⚡",
                daysLeft: 15
            },
            {
                name: "Winter Frost",
                description: "Abrigos premium con tecnología térmica. Lanzamiento próximo mes.",
                emoji: "❄️",
                daysLeft: 30
            },
            {
                name: "Limited Edition 001",
                description: "Solo 500 piezas disponibles. Diseño colaborativo exclusivo.",
                emoji: "👑",
                daysLeft: 45
            }
        ];

        function renderCollections(data, containerId, isActive = true) {
            const container = document.getElementById(containerId);
            container.innerHTML = data.map(col => `
                <div class="collection-card ${!isActive ? 'coming-soon' : ''}">
                    ${!isActive ? `<div class="comingsoon-text">Próximamente</div>` : ''}
                    <div class="card-image">${col.emoji}</div>
                    <div class="card-content">
                        <div class="collection-name">${col.name}</div>
                        <p class="collection-desc">${col.description}</p>
                        <span class="status-badge ${isActive ? 'status-active' : 'status-coming'}">
                            ${isActive ? '✓ Disponible' : `⏳ En ${col.daysLeft} días`}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        // Renderizar colecciones al cargar
        renderCollections(activeCollections, 'activeCollections', true);
        renderCollections(comingCollections, 'comingCollections', false);
    </script>
</body>
</html>
